<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="profile-card">
            <div class="card-header">
                <div class="profile-image">
                    <!-- CSS-generated placeholder -->
                    <div class="avatar"></div>
                </div>
            </div>
            <div class="card-content">
                <h1 class="name">Alex Johnson</h1>
                <p class="major">Computer Science & Design</p>
                <p class="bio">
                    Passionate about building intuitive user interfaces and exploring the intersection of technology and art. Currently focusing on creative coding and UX research.
                </p>
                
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-value">3.9</span>
                        <span class="stat-label">GPA</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">Junior</span>
                        <span class="stat-label">Year</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">92</span>
                        <span class="stat-label">Credits</span>
                    </div>
                </div>

                <div class="actions">
                    <button class="btn btn-primary">Follow</button>
                    <button class="btn btn-secondary">Contact</button>
                </div>

                <div class="social-links">
                    <div class="social-icon"></div>
                    <div class="social-icon"></div>
                    <div class="social-icon"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
